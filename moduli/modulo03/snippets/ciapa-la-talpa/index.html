<!DOCTYPE html>
<html>
    <head>
        <title>Ciapa la talpa</title>
        <link rel="stylesheet" href="styles.css">
        <script type="text/javascript" src="animazione.js"></script>
    </head>
    <body>
        <h1>Ciapa la talpa</h1>
        <hr>
        <h2>Dimostra la velocit&agrave; dei tuoi riflessi.</h2>
        <h3>Colpisci la talpa quando compare.</h3>
        <div class="container">
            <img class="img" id="buca-dietro" src="img/Buca_dietro.png" alt="buca dietro">
            <img class="img" id="talpa" src="img/Talpa_sorridente.png" alt="talpa" usemap="#mappa-talpa">
            <map name="mappa-talpa">
                <area shape="poly" coords="164,223,169,196,192,184,207,117,256,90,279,91,282,96,321,124,337,184,366,205,365,226" href="javascript:talpa_colpita()">
            </map>
            <img class="img" id="talpa_colpita" src="img/Talpa_colpita.png" alt="talpa_colpita">
            <img class="img" id="buca-davanti" src="img/buco_davanti.png" alt="buca davanti">
            <button class="start" onclick="start_game()">START</button>
        </div>
        <h4 id="titolo-risultati">Tempi di reazione per colpire la talpa</h4>
        <ul id="risultati">

        </ul>
    </body>
</html>
